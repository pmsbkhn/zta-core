// AuthZEN Access Evaluation as a gRPC contract for the internal (East-West)
// data path. It mirrors the JSON VSP Standard Contract (docs/design-v3 §3): the
// open-ended `properties` / `context` objects map to google.protobuf.Struct so
// arbitrary business attributes survive without a fixed schema, while the typed
// envelope keeps the hot internal path efficient (design-v3 §6.1).
syntax = "proto3";

package vsp.authzen.v1;

option go_package = "github.com/pmsbkhn/zta-core/proto/authzen/v1;authzenv1";

import "google/protobuf/struct.proto";

message Subject {
  string type = 1;                     // "user" | "workload"
  string id = 2;
  google.protobuf.Struct properties = 3;
}

message Action {
  string name = 1;                     // "<domain>:<action>"
  google.protobuf.Struct properties = 2;
}

message Resource {
  string type = 1;                     // "<domain>:<entity>"
  string id = 2;
  google.protobuf.Struct properties = 3;
}

message EvaluationRequest {
  Subject subject = 1;
  Action action = 2;
  Resource resource = 3;
  google.protobuf.Struct context = 4;
}

message DecisionToken {
  string value = 1;
  int32 ttl_seconds = 2;
}

message Obligation {
  string type = 1;                     // "step_up" | "log"
  google.protobuf.Struct details = 2;
}

message EvaluationResponse {
  bool decision = 1;
  DecisionToken decision_token = 2;    // set when decision == true
  repeated Obligation obligations = 3;
  string reason_code = 4;
}

// AccessEvaluation is the gRPC equivalent of POST /access/v1/evaluation.
service AccessEvaluation {
  rpc Evaluate(EvaluationRequest) returns (EvaluationResponse);
}
